app = "argos-v2-worker-jared"
primary_region = "lax"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  HOST = "0.0.0.0"
  PORT = "8787"
  NODE_ENV = "production"
  CALL_PROCESSING_ENABLED = "true"

[checks]
  [checks.health]
    type = "http"
    port = 8787
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
