name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run root verification
        run: npm run verify

  worker-db-tests:
    name: Worker DB tests
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      WORKER_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Bootstrap Supabase-compatible test database
        run: |
          psql "$WORKER_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          create extension if not exists pgcrypto;
          create schema if not exists auth;

          do $$
          begin
            if not exists (select 1 from pg_roles where rolname = 'anon') then
              create role anon nologin;
            end if;

            if not exists (select 1 from pg_roles where rolname = 'authenticated') then
              create role authenticated nologin;
            end if;
          end
          $$;

          create or replace function auth.uid()
          returns uuid
          language sql
          stable
          as $$
            select nullif(current_setting('request.jwt.claim.sub', true), '')::uuid
          $$;

          grant usage on schema auth to anon, authenticated;
          grant execute on function auth.uid() to anon, authenticated;
          SQL

      - name: Apply Supabase migrations
        run: |
          for migration in supabase/migrations/*.sql; do
            echo "Applying ${migration}"
            psql "$WORKER_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Run worker DB-backed tests
        run: npm run test:worker -- src/calls/repository.test.ts src/security/rls-policies.test.ts
