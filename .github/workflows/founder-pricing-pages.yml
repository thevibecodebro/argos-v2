name: Deploy Founder Pricing Site

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/founder-pricing-pages.yml
      - package.json
      - package-lock.json
      - scripts/build-founder-pricing-site.mjs
      - site/founder-pricing/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: founder-pricing-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run founder pricing tests
        run: npm run test:founder-pricing

      - name: Build founder pricing site
        run: npm run build:founder-pricing

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
