project_id = "argos-v2"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Canonical hosted Auth site URL. Local app flows pass an explicit redirect URL,
# and localhost remains allowed below for development callbacks.
site_url = "https://argosrevenuecommand.com"
additional_redirect_urls = [
  "http://127.0.0.1:3000/**",
  "http://localhost:3000/**",
  "https://argosrevenuecommand.com/auth/callback",
  "https://www.argosrevenuecommand.com/auth/callback",
  "https://argos-v2-nine.vercel.app/auth/callback",
  "https://argos-v2-thevibecodebro.vercel.app/auth/callback",
  "https://argos-v2-git-main-thevibecodebro.vercel.app/auth/callback",
  "https://*-thevibecodebro.vercel.app/auth/callback"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = false
enable_confirmations = false
double_confirm_changes = true

[auth.external.google]
enabled = true
client_id = "1032844026608-0s5sqk0ghgpjrgtjkm21c5tbveusrv7u.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
skip_nonce_check = false
